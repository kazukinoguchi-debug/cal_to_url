<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googleカレンダー・タスクURL生成ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .tab-active {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
        }
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
        .btn-disabled {
            background-color: #d1d5db !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: none !important;
        }
        #qrModal { background-color: rgba(0, 0, 0, 0.6); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <div class="card p-6 md:p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <span class="mr-2 text-3xl">📅</span>
                共有URL生成ツール
            </h1>

            <div class="flex border-b border-gray-200 mb-6">
                <button id="tabCalendar" class="flex-1 py-3 text-sm font-bold tab-active transition">Googleカレンダー</button>
                <button id="tabTask" class="flex-1 py-3 text-sm font-bold text-gray-500 hover:text-blue-600 transition">Googleタスク</button>
            </div>

            <p id="descriptionText" class="text-sm text-gray-600 mb-8 font-medium">Googleカレンダー登録URLの生成</p>

            <div class="space-y-4">
                <div>
                    <label id="labelTitle" class="block text-sm font-semibold text-gray-700 mb-1">予定のタイトル *</label>
                    <input type="text" id="eventTitle" placeholder="例：打ち合わせ" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>

                <div class="flex flex-wrap gap-4 py-2">
                    <div id="allDaySection" class="flex items-center space-x-2">
                        <input type="checkbox" id="allDayCheck" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <label for="allDayCheck" class="text-sm font-semibold text-gray-700 cursor-pointer">終日の予定にする</label>
                    </div>
                    <div id="noDueSection" class="hidden flex items-center space-x-2">
                        <input type="checkbox" id="noDueCheck" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <label for="noDueCheck" class="text-sm font-semibold text-gray-700 cursor-pointer">期限を設定しない</label>
                    </div>
                </div>

                <div id="dateSection" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="startGroup">
                        <label id="labelStart" class="block text-sm font-semibold text-gray-700 mb-1">開始日時 *</label>
                        <input type="datetime-local" id="startTime" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <input type="date" id="startDate" class="hidden w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div id="endTimeSection">
                        <label id="labelEnd" class="block text-sm font-semibold text-gray-700 mb-1">終了日時 *</label>
                        <input type="datetime-local" id="endTime" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <input type="date" id="endDate" class="hidden w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <div id="locationSection">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">場所</label>
                    <input type="text" id="location" placeholder="例：Zoom, 会議室など" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">詳細・メモ</label>
                    <textarea id="description" rows="3" placeholder="相手に伝えたいメモ" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>

                <div class="pt-6 border-t border-gray-100 flex flex-col gap-3">
                    <button id="copyBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition duration-200 flex items-center justify-center shadow-lg active:transform active:scale-95 btn-disabled" disabled>
                        <span class="mr-2">📋</span>
                        URLをコピー
                    </button>
                    <button id="qrBtn" class="w-full bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-4 rounded-xl transition duration-200 flex items-center justify-center active:transform active:scale-95 btn-disabled" disabled>
                        <span class="mr-2">📱</span>
                        QRコードを表示
                    </button>
                </div>

                <div id="statusMessage" class="hidden text-center text-sm font-medium py-3 rounded-lg mt-4"></div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-xs w-full mx-4">
            <h3 class="text-lg font-bold mb-4">スマホでスキャン</h3>
            <canvas id="qrCanvas" class="mx-auto mb-6"></canvas>
            <div class="space-y-2">
                <button id="downloadQr" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition flex items-center justify-center">
                    <span class="mr-2">📥</span>画像を保存
                </button>
                <button id="closeQr" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded-lg transition">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        // UI & Event Handlers
        const tabCalendar = document.getElementById('tabCalendar');
        const tabTask = document.getElementById('tabTask');
        const eventTitle = document.getElementById('eventTitle');
        const allDayCheck = document.getElementById('allDayCheck');
        const noDueCheck = document.getElementById('noDueCheck');
        const startTime = document.getElementById('startTime');
        const endTime = document.getElementById('endTime');
        const startDate = document.getElementById('startDate');
        const endDate = document.getElementById('endDate');
        const locationInput = document.getElementById('location');
        const descriptionInput = document.getElementById('description');
        const copyBtn = document.getElementById('copyBtn');
        const qrBtn = document.getElementById('qrBtn');
        const statusMessage = document.getElementById('statusMessage');
        const qrCanvas = document.getElementById('qrCanvas');
        const downloadQrBtn = document.getElementById('downloadQr');

        let mode = 'calendar'; 
        let isEndTimeModified = false;

        const init = () => {
            const now = new Date();
            now.setMinutes(0);
            const start = new Date(now.getTime() + 3600000);
            const end = new Date(start.getTime() + 3600000);
            const offset = now.getTimezoneOffset() * 60000;
            startTime.value = new Date(start.getTime() - offset).toISOString().slice(0, 16);
            endTime.value = new Date(end.getTime() - offset).toISOString().slice(0, 16);
            startDate.value = new Date(start.getTime() - offset).toISOString().slice(0, 10);
            endDate.value = startDate.value;
        };

        init();

        const updateUI = () => {
            const isAllDay = allDayCheck.checked;
            const noDue = noDueCheck.checked;
            const isCal = mode === 'calendar';

            tabCalendar.className = isCal ? "flex-1 py-3 text-sm font-bold tab-active transition" : "flex-1 py-3 text-sm font-bold text-gray-500 hover:text-blue-600 transition";
            tabTask.className = !isCal ? "flex-1 py-3 text-sm font-bold tab-active transition" : "flex-1 py-3 text-sm font-bold text-gray-500 hover:text-blue-600 transition";
            
            document.getElementById('descriptionText').textContent = isCal ? "Googleカレンダー登録URLの生成" : "Googleタスク追加URLの生成";
            document.getElementById('labelTitle').textContent = isCal ? "予定のタイトル *" : "タスク名 *";
            document.getElementById('labelStart').textContent = isAllDay ? "期日/開始日 *" : "期日/開始日時 *";
            
            document.getElementById('allDaySection').classList.remove('hidden');
            document.getElementById('noDueSection').classList.toggle('hidden', isCal);
            document.getElementById('dateSection').classList.toggle('hidden', !isCal && noDue);
            document.getElementById('endTimeSection').classList.toggle('hidden', !isCal);
            document.getElementById('locationSection').classList.toggle('hidden', !isCal);
            
            startTime.classList.toggle('hidden', isAllDay);
            startDate.classList.toggle('hidden', !isAllDay);
            endDate.classList.toggle('hidden', !isAllDay || !isCal);
        };

        const validate = () => {
            const hasTitle = eventTitle.value.trim().length > 0;
            [copyBtn, qrBtn].forEach(btn => {
                btn.disabled = !hasTitle;
                btn.classList.toggle('btn-disabled', !hasTitle);
            });
        };

        [tabCalendar, tabTask].forEach(t => t.addEventListener('click', (e) => { mode = e.target.id === 'tabCalendar' ? 'calendar' : 'task'; updateUI(); validate(); }));
        [eventTitle, allDayCheck, noDueCheck, startTime, endTime, startDate, endDate, locationInput, descriptionInput].forEach(el => {
            el.addEventListener('input', () => { if(el === allDayCheck || el === noDueCheck) { isEndTimeModified = false; updateUI(); } validate(); });
        });

        const getUrl = () => {
            const title = encodeURIComponent(eventTitle.value.trim());
            const desc = encodeURIComponent(descriptionInput.value.trim());
            const isAllDay = allDayCheck.checked;
            const noDue = noDueCheck.checked;

            const toGDate = (dStr, allDay) => {
                const d = new Date(dStr);
                if (allDay) return d.toISOString().slice(0, 10).replace(/-/g, "");
                return d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            };

            if (mode === 'calendar') {
                let dates = isAllDay ? `${startDate.value.replace(/-/g, "")}/${new Date(new Date(endDate.value).getTime() + 86400000).toISOString().slice(0, 10).replace(/-/g, "")}` : `${toGDate(startTime.value)}/${toGDate(endTime.value)}`;
                return `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${desc}&location=${encodeURIComponent(locationInput.value.trim())}`;
            } else {
                let url = `https://tasks.google.com/add?text=${title}&notes=${desc}`;
                if (!noDue) url += `&due=${isAllDay ? startDate.value.replace(/-/g, "") : toGDate(startTime.value)}`;
                return url;
            }
        };

        const showStatus = (msg, err = false) => {
            statusMessage.textContent = msg;
            statusMessage.className = err ? "text-red-600 bg-red-50 block p-3 rounded-lg mt-4" : "text-green-600 bg-green-50 block p-3 rounded-lg mt-4";
            setTimeout(() => statusMessage.className = "hidden", 4000);
        };

        const copyToClipboard = (text) => {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            const result = document.execCommand('copy');
            document.body.removeChild(textarea);
            return result;
        };

        copyBtn.addEventListener('click', () => { if(copyToClipboard(getUrl())) showStatus("URLをコピーしました！"); });

        // QR生成ロジック：アイコン付き
        qrBtn.addEventListener('click', () => {
            const url = getUrl();
            const size = 300;
            const iconSize = 60;

            // QRコードの生成 (Error Correction LevelをHにしてアイコンで隠れても読めるようにする)
            const qr = new QRious({
                element: qrCanvas,
                value: url,
                size: size,
                level: 'H'
            });

            const ctx = qrCanvas.getContext('2d');
            
            // アイコンの背景白枠を描画
            ctx.fillStyle = "#FFFFFF";
            const bgPos = (size - iconSize) / 2 - 4;
            const bgSize = iconSize + 8;
            ctx.beginPath();
            ctx.roundRect(bgPos, bgPos, bgSize, bgSize, 8);
            ctx.fill();

            // アイコン（絵文字）を描画
            ctx.font = `${iconSize * 0.8}px serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const icon = mode === 'calendar' ? '📅' : '✅';
            ctx.fillText(icon, size / 2, size / 2);

            document.getElementById('qrModal').classList.remove('hidden');
        });

        downloadQrBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `google_qr_${Date.now()}.png`;
            link.href = qrCanvas.toDataURL('image/png');
            link.click();
        });

        document.getElementById('closeQr').addEventListener('click', () => document.getElementById('qrModal').classList.add('hidden'));
        document.getElementById('qrModal').addEventListener('click', (e) => { if(e.target.id === 'qrModal') e.target.classList.add('hidden'); });

        updateUI();
        validate();
    </script>
</body>
</html>
